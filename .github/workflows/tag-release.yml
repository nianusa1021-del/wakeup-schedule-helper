name: Tag Release APK

on:
  push:
    tags:
      - "[0-9]*-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Validate tag and extract metadata
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^[0-9]+-.+ ]]; then
            echo "Invalid tag format: $TAG"
            echo "Expected: [versionCode]-[versionName], for example: 2-1.1.0-wakeup-6.1.30"
            exit 1
          fi

          APP_VERSION_CODE=$(grep -E "^[[:space:]]*versionCode[[:space:]]+[0-9]+" app/build.gradle | head -n1 | awk '{print $2}')
          APP_VERSION_NAME=$(grep -E "^[[:space:]]*versionName[[:space:]]+\".+\"" app/build.gradle | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          EXPECTED_TAG="${APP_VERSION_CODE}-${APP_VERSION_NAME}"

          if [[ "$TAG" != "$EXPECTED_TAG" ]]; then
            echo "Tag does not match app version."
            echo "Expected tag: $EXPECTED_TAG"
            echo "Current tag:  $TAG"
            exit 1
          fi

          VERSION_NAME="${TAG#*-}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_name=wakeup-helper-${TAG}.apk" >> "$GITHUB_OUTPUT"

      - name: Prepare release asset
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/${{ steps.meta.outputs.asset_name }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wakeup-helper-${{ github.ref_name }}-apk
          path: app/build/outputs/apk/debug/${{ steps.meta.outputs.asset_name }}
          if-no-files-found: error

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.meta.outputs.version_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/debug/${{ steps.meta.outputs.asset_name }}
          fail_on_unmatched_files: true
