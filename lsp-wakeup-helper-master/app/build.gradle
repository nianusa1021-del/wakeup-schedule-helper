plugins {
    id 'com.android.application'
}

android {
    namespace 'cn.dorimu.lsp.wakeuphelper'
    compileSdk 35

    defaultConfig {
        applicationId "cn.dorimu.lsp.wakeuphelper"
        minSdk 21
        targetSdk 35
        versionCode 2
        versionName "1.1.0-wakeup-6.1.30"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    packaging {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}']
        }
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
